<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Vera — Tu asistente de estética</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #1D9E75;
    --green-dark: #0F6E56;
    --green-light: #E1F5EE;
    --green-mid: #5DCAA5;
    --cream: #faf9f7;
    --cream-dark: #f2f0ec;
    --ink: #1a1a18;
    --ink-mid: #4a4a47;
    --ink-light: #9a9a95;
    --border: rgba(0,0,0,0.08);
  }

  html, body {
    height: 100%;
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--ink);
    overflow: hidden;
  }

  .app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    max-width: 480px;
    margin: 0 auto;
    background: #fff;
    position: relative;
  }

  /* ── HEADER ── */
  .header {
    background: linear-gradient(135deg, var(--green) 0%, var(--green-dark) 100%);
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  .header-avatar {
    width: 42px; height: 42px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    border: 1.5px solid rgba(255,255,255,0.35);
    display: flex; align-items: center; justify-content: center;
    font-weight: 600; font-size: 17px; color: #fff;
    flex-shrink: 0;
  }
  .header-info { flex: 1; }
  .header-info strong { display: block; color: #fff; font-size: 16px; font-weight: 500; }
  .header-status {
    display: flex; align-items: center; gap: 5px;
    font-size: 11px; color: rgba(255,255,255,0.75);
    margin-top: 2px;
  }
  .status-dot {
    width: 6px; height: 6px;
    background: #7fffce; border-radius: 50%;
    animation: blink 2s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .header-actions { display: flex; gap: 8px; }
  .header-btn {
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 20px;
    color: #fff;
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    padding: 5px 12px;
    cursor: pointer;
    transition: background 0.15s;
    white-space: nowrap;
  }
  .header-btn:hover { background: rgba(255,255,255,0.28); }

  /* ── MENSAJES ── */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 18px 16px 12px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    scroll-behavior: smooth;
  }
  .messages::-webkit-scrollbar { width: 3px; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .msg-row { display: flex; gap: 8px; margin-bottom: 8px; }
  .msg-row.user { justify-content: flex-end; }
  .msg-avatar {
    width: 30px; height: 30px; border-radius: 50%;
    background: var(--green); color: #fff;
    font-size: 12px; font-weight: 500;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; align-self: flex-end;
  }
  .msg-bubble {
    max-width: 80%;
    padding: 11px 15px;
    border-radius: 18px;
    font-size: 14px;
    line-height: 1.6;
    white-space: pre-wrap;
  }
  .msg-row.assistant .msg-bubble { background: #f4f3f0; color: var(--ink); border-bottom-left-radius: 4px; }
  .msg-row.user .msg-bubble { background: var(--green); color: #fff; border-bottom-right-radius: 4px; }

  /* ── TREATMENT CARDS ── */
  .chat-cards { margin-top: 10px; display: flex; flex-direction: column; gap: 7px; }
  .chat-card {
    background: #fff; border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 12px;
    text-decoration: none; color: var(--ink); display: block;
    transition: border-color 0.15s, background 0.15s;
  }
  .chat-card:hover { border-color: var(--green-mid); background: var(--green-light); }
  .chat-card-name { font-size: 13px; font-weight: 500; margin-bottom: 3px; }
  .chat-card-meta { font-size: 11px; color: var(--ink-light); display: flex; gap: 8px; flex-wrap: wrap; }
  .chat-card-meta .cc-price { color: var(--ink-mid); font-weight: 500; }
  .chat-card-meta .cc-rating { color: var(--green); }
  .chat-card-arrow { float: right; color: var(--green-mid); font-size: 13px; }

  /* ── CLINIC CARDS ── */
  .clinic-cards { margin-top: 10px; display: flex; flex-direction: column; gap: 8px; }
  .clinic-card {
    background: #fff; border: 1px solid var(--border);
    border-radius: 12px; padding: 12px 14px;
    text-decoration: none; color: var(--ink); display: block;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .clinic-card:hover { border-color: var(--green-mid); box-shadow: 0 2px 12px rgba(29,158,117,0.1); }
  .clinic-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 4px; }
  .clinic-name { font-size: 13px; font-weight: 500; }
  .clinic-rating {
    font-size: 11px; color: var(--green);
    background: var(--green-light);
    padding: 2px 8px; border-radius: 10px; white-space: nowrap; flex-shrink: 0;
  }
  .clinic-address { font-size: 12px; color: var(--ink-light); margin-bottom: 7px; }
  .clinic-footer { display: flex; align-items: center; justify-content: space-between; }
  .clinic-phone { font-size: 12px; color: var(--green-dark); font-weight: 500; }
  .clinic-link { font-size: 11px; color: var(--green); }

  /* ── CHIPS ── */
  .chips-wrap { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
  .chip {
    background: #fff; border: 1px solid #e4e3df;
    border-radius: 14px; padding: 11px 15px;
    font-size: 14px; cursor: pointer; text-align: left;
    color: var(--ink); font-family: 'DM Sans', sans-serif;
    transition: all 0.15s; line-height: 1.4;
  }
  .chip:hover { background: var(--green-light); border-color: var(--green-mid); color: var(--green-dark); }

  /* ── TYPING ── */
  .typing-row { display: flex; gap: 8px; align-items: flex-end; margin-bottom: 8px; }
  .typing-bubble {
    background: #f4f3f0; border-radius: 18px 18px 18px 4px;
    padding: 13px 16px; display: flex; gap: 5px; align-items: center;
  }
  .typing-dot {
    width: 7px; height: 7px; border-radius: 50%; background: #bbb;
    animation: typing 1.3s ease-in-out infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.18s; }
  .typing-dot:nth-child(3) { animation-delay: 0.36s; }
  @keyframes typing {
    0%,100% { opacity: 0.3; transform: translateY(0); }
    50% { opacity: 1; transform: translateY(-3px); }
  }

  /* ── INPUT ── */
  .input-area {
    padding: 12px 14px; border-top: 1px solid var(--border);
    display: flex; gap: 8px; align-items: center;
    flex-shrink: 0; background: #fff;
  }
  .chat-input {
    flex: 1; border: 1.5px solid #e4e3df;
    border-radius: 16px; padding: 11px 16px;
    font-family: 'DM Sans', sans-serif; font-size: 14px;
    background: var(--cream); color: var(--ink);
    outline: none; transition: border-color 0.15s;
  }
  .chat-input:focus { border-color: var(--green-mid); background: #fff; }
  .chat-input::placeholder { color: var(--ink-light); }
  .send-btn {
    width: 44px; height: 44px; border-radius: 14px;
    background: var(--green); border: none; color: #fff;
    font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: background 0.15s, transform 0.1s;
  }
  .send-btn:hover:not(:disabled) { background: var(--green-dark); }
  .send-btn:active:not(:disabled) { transform: scale(0.94); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .footer-note {
    text-align: center; font-size: 10px; color: var(--ink-light);
    padding: 5px 14px 10px; background: #fff;
  }

  /* ── PANEL ENLACES ── */
  .links-overlay {
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.3); z-index: 50;
    opacity: 0; pointer-events: none; transition: opacity 0.25s;
  }
  .links-overlay.open { opacity: 1; pointer-events: all; }
  .links-panel {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: #fff; border-radius: 20px 20px 0 0;
    padding: 0 0 24px; max-height: 65vh; overflow-y: auto;
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
    z-index: 51;
  }
  .links-panel.open { transform: translateY(0); }
  .links-handle { width: 36px; height: 4px; background: #ddd; border-radius: 2px; margin: 12px auto 16px; }
  .links-title { font-size: 14px; font-weight: 500; padding: 0 18px 12px; border-bottom: 1px solid var(--border); margin-bottom: 8px; }
  .links-empty { font-size: 13px; color: var(--ink-light); padding: 8px 18px; }
  .link-item {
    display: flex; align-items: center; gap: 10px;
    padding: 11px 18px; text-decoration: none; color: var(--ink);
    transition: background 0.15s;
  }
  .link-item:hover { background: var(--cream); }
  .link-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
  .link-item-text { flex: 1; min-width: 0; }
  .link-item-name { font-size: 13px; font-weight: 500; }
  .link-item-url { font-size: 11px; color: var(--ink-light); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .link-arrow { font-size: 12px; color: var(--green-mid); }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="header-avatar">V</div>
    <div class="header-info">
      <strong>Vera</strong>
      <div class="header-status">
        <div class="status-dot"></div>
        <span>Asistente de exploración estética</span>
      </div>
    </div>
    <div class="header-actions">
      <button class="header-btn" onclick="toggleLinks()">🔗 Enlaces</button>
      <button class="header-btn" onclick="resetChat()">↺ Nueva</button>
    </div>
  </div>

  <div class="messages" id="messages"></div>

  <div class="input-area">
    <input type="text" class="chat-input" id="chatInput"
      placeholder="Escríbeme tu pregunta..."
      onkeydown="if(event.key==='Enter') sendMessage()">
    <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>↑</button>
  </div>
  <div class="footer-note">Vera orienta, no diagnostica · Consulta siempre con un especialista</div>

  <div class="links-overlay" id="linksOverlay" onclick="toggleLinks()"></div>
  <div class="links-panel" id="linksPanel">
    <div class="links-handle"></div>
    <div class="links-title">🔗 Enlaces de esta conversación</div>
    <div id="linksList"><div class="links-empty">Aún no hay enlaces en esta conversación.</div></div>
  </div>
</div>

<script>
  const API_URL = "https://vera-chatbot-ai.up.railway.app/api/chat";

  const CHIPS_INICIO = [
    "🔍 Quiero mejorar algo pero no sé qué tratamiento",
    "💉 Tengo un tratamiento en mente y quiero saber más",
    "📍 Quiero ver opciones para una zona específica",
    "💬 Tengo dudas sobre algo que ya me hice",
    "✈️ Vivo fuera y quiero hacerme un tratamiento en España",
  ];

  let messages = [];
  let isLoading = false;
  let collectedLinks = [];
  let linksInitialized = false;

  const messagesEl = document.getElementById("messages");
  const input = document.getElementById("chatInput");
  const sendBtn = document.getElementById("sendBtn");

  input.addEventListener("input", () => {
    sendBtn.disabled = !input.value.trim() || isLoading;
  });

  function init() {
    addMessage("assistant", "Hola, soy Vera 👋\n¿Qué te trae por aquí hoy? Puedes contármelo con tus palabras o empezar por una de estas opciones:", [], []);
    renderChips(CHIPS_INICIO);
  }

  function resetChat() {
    messages = [];
    collectedLinks = [];
    linksInitialized = false;
    messagesEl.innerHTML = "";
    document.getElementById("linksList").innerHTML = '<div class="links-empty">Aún no hay enlaces en esta conversación.</div>';
    input.value = "";
    sendBtn.disabled = true;
    init();
  }

  function toggleLinks() {
    const overlay = document.getElementById("linksOverlay");
    const panel = document.getElementById("linksPanel");
    const isOpen = panel.classList.contains("open");
    overlay.classList.toggle("open", !isOpen);
    panel.classList.toggle("open", !isOpen);
  }

  function addLink(name, url) {
    if (!url || collectedLinks.find(l => l.url === url)) return;
    collectedLinks.push({ name, url });
    const list = document.getElementById("linksList");
    if (!linksInitialized) {
      list.innerHTML = "";
      linksInitialized = true;
    }
    const a = document.createElement("a");
    a.className = "link-item";
    a.href = url;
    a.target = "_blank";
    a.rel = "noopener noreferrer";
    a.innerHTML = `
      <div class="link-dot"></div>
      <div class="link-item-text">
        <div class="link-item-name">${name}</div>
        <div class="link-item-url">${url.replace("https://www.multiestetica.com", "multiestetica.com")}</div>
      </div>
      <span class="link-arrow">→</span>`;
    list.appendChild(a);
  }

  function renderChips(chipLabels) {
    const wrap = document.createElement("div");
    wrap.className = "chips-wrap";
    chipLabels.forEach(label => {
      const isOtro = label.toLowerCase().includes("otro") || label.toLowerCase().includes("other");
      const isVerToda = label.toLowerCase().includes("ver toda");
      if (isOtro) {
        const inp = document.createElement("input");
        inp.type = "text";
        inp.className = "chip";
        inp.placeholder = "Escribe aquí...";
        inp.style.cursor = "text";
        inp.style.background = "#fff";
        inp.onkeydown = (e) => {
          if (e.key === "Enter" && inp.value.trim()) { wrap.remove(); sendMessage(inp.value.trim()); }
        };
        wrap.appendChild(inp);
      } else {
        const btn = document.createElement("button");
        btn.className = "chip";
        btn.textContent = label;
        btn.onclick = () => { wrap.remove(); sendMessage(label); };
        wrap.appendChild(btn);
      }
    });
    messagesEl.appendChild(wrap);
    scrollBottom();
  }

  function addMessage(role, content, cards = [], clinics = []) {
    messages.push({ role, content });
    const row = document.createElement("div");
    row.className = `msg-row ${role}`;
    if (role === "assistant") {
      const avatar = document.createElement("div");
      avatar.className = "msg-avatar";
      avatar.textContent = "V";
      row.appendChild(avatar);
    }
    const bubble = document.createElement("div");
    bubble.className = "msg-bubble";
    bubble.innerHTML = content
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
      .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
      .replace(/^- (.+)/gm, "<li>$1</li>")
      .replace(/(<li>[\s\S]*?<\/li>)/g, '<ul style="padding-left:16px;margin-top:8px;display:flex;flex-direction:column;gap:5px;">$1</ul>')
      .replace(/\n/g, "<br>");

    if (cards?.length) {
      const cardsEl = document.createElement("div");
      cardsEl.className = "chat-cards";
      cards.forEach(card => {
        const a = document.createElement("a");
        a.className = "chat-card";
        a.href = card.url || "#";
        a.target = "_blank";
        a.rel = "noopener noreferrer";
        a.innerHTML = `
          <span class="chat-card-arrow">→</span>
          <div class="chat-card-name">${card.name}</div>
          <div class="chat-card-meta">
            ${card.price ? `<span class="cc-price">Desde ${card.price.toLocaleString()} €</span>` : ""}
            ${card.worthIt ? `<span class="cc-rating">★ ${card.worthIt}</span>` : ""}
            ${card.reviews ? `<span>${card.reviews} exp.</span>` : ""}
          </div>`;
        cardsEl.appendChild(a);
        if (card.url) addLink(card.name, card.url);
      });
      bubble.appendChild(cardsEl);
    }

    if (clinics?.length) {
      const clinicsEl = document.createElement("div");
      clinicsEl.className = "clinic-cards";
      clinics.forEach(clinic => {
        const a = document.createElement("a");
        a.className = "clinic-card";
        a.href = clinic.url || "#";
        a.target = "_blank";
        a.rel = "noopener noreferrer";
        a.innerHTML = `
          <div class="clinic-header">
            <div class="clinic-name">${clinic.name}</div>
            ${clinic.rating ? `<div class="clinic-rating">★ ${clinic.rating} (${clinic.reviews || 0})</div>` : ""}
          </div>
          <div class="clinic-address">📍 ${clinic.address || clinic.ciudad}</div>
          <div class="clinic-footer">
            ${clinic.phone ? `<div class="clinic-phone">${clinic.phone}</div>` : "<div></div>"}
            <div class="clinic-link">Ver perfil →</div>
          </div>`;
        clinicsEl.appendChild(a);
        if (clinic.url) addLink(clinic.name, clinic.url);
      });
      bubble.appendChild(clinicsEl);
    }

    row.appendChild(bubble);
    messagesEl.appendChild(row);
    scrollBottom();
  }

  function showTyping() {
    const row = document.createElement("div");
    row.className = "typing-row";
    row.id = "typingIndicator";
    row.innerHTML = `<div class="msg-avatar">V</div><div class="typing-bubble"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
    messagesEl.appendChild(row);
    scrollBottom();
  }

  function hideTyping() { document.getElementById("typingIndicator")?.remove(); }

  function scrollBottom() {
    setTimeout(() => { messagesEl.scrollTop = messagesEl.scrollHeight; }, 50);
  }

  async function sendMessage(text) {
    const content = text || input.value.trim();
    if (!content || isLoading) return;
    input.value = "";
    sendBtn.disabled = true;
    messagesEl.querySelector(".chips-wrap")?.remove();
    addMessage("user", content);
    isLoading = true;
    showTyping();
    try {
      const res = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          messages: messages.map(m => ({ role: m.role, content: m.content })),
        }),
      });
      const data = await res.json();
      hideTyping();
      addMessage("assistant", data.reply, data.context || [], data.clinics || []);
      if (data.chips?.length) renderChips(data.chips);
    } catch (e) {
      hideTyping();
      addMessage("assistant", "Algo salió mal. ¿Lo intentamos de nuevo?");
    } finally {
      isLoading = false;
      sendBtn.disabled = !input.value.trim();
    }
  }

  init();
</script>
</body>
</html>
